{% extends 'base.html' %}

{% block content %}

<div class="card shadow p-4">
    <h2>Iniciar sesión</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            Ingresar
        </button>
    </form>

    <hr>

    <a href="{% url 'registro' %}">
        Crear una cuenta
    </a>
</div>

{% endblock %}

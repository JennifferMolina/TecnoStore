{% extends 'base.html' %}

{% block content %}

<div class="card shadow p-4">
    <h2>Registro de Usuario</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-success">
            Registrarse
        </button>
    </form>

    <hr>

    <a href="{% url 'login' %}">
        ¿Ya tienes cuenta? Inicia sesión
    </a>
</div>

{% endblock %}
